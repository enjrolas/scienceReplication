<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Science Replication{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8f9fa;
        }
        header {
            background: #1a1a2e;
            color: #e8e8e8;
            padding: 2rem;
            text-align: center;
        }
        header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        header h1 a { color: inherit; text-decoration: none; }
        header h1 a:hover { opacity: 0.85; }
        header p { color: #a0a0b8; font-size: 0.95rem; }
        nav {
            background: #16213e;
            padding: 0.8rem 2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        nav a {
            color: #7ec8e3;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            transition: background 0.2s;
        }
        nav a:hover, nav a.active { background: rgba(126, 200, 227, 0.15); }
        main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid #ddd;
            margin-top: 3rem;
        }
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-arxiv { background: #b31b1b; color: white; }
        .badge-biorxiv { background: #7a2d2d; color: white; }
        .badge-latex { background: #008080; color: white; }
        .badge-pdf { background: #c0392b; color: white; }
        .badge-data { background: #2e86c1; color: white; }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <h1><a href="/">Experiments in Replicating Science</a></h1>
    </header>
    <nav>
        <a href="/">Home</a>
        {% block nav_items %}{% endblock %}
        <a href="/upload/">Upload Paper</a>
        <a href="/manage/">Manage</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        Science Replication &mdash; sciencereplication.artiswrong.com
    </footer>
</body>
</html>
