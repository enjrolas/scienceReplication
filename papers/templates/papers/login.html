<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Science Replication</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            width: 100%;
            max-width: 360px;
        }
        .login-box h1 { font-size: 1.3rem; margin-bottom: 1rem; color: #1a1a2e; }
        .form-input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        .btn {
            width: 100%;
            padding: 0.6rem;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn:hover { background: #16213e; }
        .error { color: #c0392b; font-size: 0.85rem; margin-bottom: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Science Replication</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.password }}
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
</body>
</html>
