<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} Topic - Science Replication</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a2e;
        }
        main {
            max-width: 500px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }
        h1 { font-size: 1.3rem; margin-bottom: 1.5rem; }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            color: #333;
        }
        .form-input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        textarea.form-input { resize: vertical; }
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-primary { background: #1a1a2e; color: white; }
        .btn-cancel { background: #eee; color: #333; margin-left: 0.5rem; }
        .errors { color: #c0392b; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <main>
        <h1>{{ action }} Topic</h1>
        {% if form.errors %}
        <div class="errors">
            {% for field, errors in form.errors.items %}
            <p>{{ field }}: {{ errors|join:", " }}</p>
            {% endfor %}
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="id_name">Name</label>
            {{ form.name }}
            <label for="id_search_terms">Search Terms</label>
            {{ form.search_terms }}
            <label for="id_description">Description</label>
            {{ form.description }}
            <button type="submit" class="btn btn-primary">{{ action }} Topic</button>
            <a href="{% url 'manage_dashboard' %}" class="btn btn-cancel">Cancel</a>
        </form>
    </main>
</body>
</html>
