<VirtualHost *:80>
    ServerName scienceReplication.artiswrong.com
    ServerAlias sciencereplication.artiswrong.com
    ServerAdmin alex@wildlives.world
    DocumentRoot /home/japhy/scienceReplication.artiswrong.com/site_output

    <Directory /home/japhy/scienceReplication.artiswrong.com/site_output>
        Require all granted
        Options Indexes FollowSymLinks
        AllowOverride None
        DirectoryIndex index.html
    </Directory>

    # Serve downloaded paper files (PDFs, LaTeX)
    Alias /files /home/japhy/scienceReplication.artiswrong.com/paper_files
    <Directory /home/japhy/scienceReplication.artiswrong.com/paper_files>
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    LogLevel info
    ErrorLog /home/japhy/logs/scienceReplication.artiswrong.com-error.log
    CustomLog /home/japhy/logs/scienceReplication.artiswrong.com-access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =scienceReplication.artiswrong.com [OR]
    RewriteCond %{SERVER_NAME} =sciencereplication.artiswrong.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName scienceReplication.artiswrong.com
    ServerAlias sciencereplication.artiswrong.com
    ServerAdmin alex@wildlives.world
    DocumentRoot /home/japhy/scienceReplication.artiswrong.com/site_output

    <Directory /home/japhy/scienceReplication.artiswrong.com/site_output>
        Require all granted
        Options Indexes FollowSymLinks
        AllowOverride None
        DirectoryIndex index.html
    </Directory>

    # Serve downloaded paper files (PDFs, LaTeX)
    Alias /files /home/japhy/scienceReplication.artiswrong.com/paper_files
    <Directory /home/japhy/scienceReplication.artiswrong.com/paper_files>
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    LogLevel info
    ErrorLog /home/japhy/logs/scienceReplication.artiswrong.com-error.log
    CustomLog /home/japhy/logs/scienceReplication.artiswrong.com-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/sciencereplication.artiswrong.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sciencereplication.artiswrong.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
